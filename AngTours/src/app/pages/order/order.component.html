<div class="order-wrap-info">
  <div class="d-flex flex-column mt-3">
    <p>Информация о туре</p>
    <div>
      <p>Название тура: {{ tour.name }}</p>
      <p>Тип тура: {{ tour.type }}</p>
      <p>Оператор: {{ tour.tourOperator }}</p>
      <p>Дата: {{ tour.date }}</p>
      <p>Стоимость: {{ tour.price }}</p>
    </div>
  </div>
</div>

<div class="d-flex flex-column mt-3 order-wrap">
  <p>Введите имя, фамилию и почту:</p>
  <div>
    <input
      placeholder="Имя"
      [ngClass]="{ 'input-error': !name }"
      [(ngModel)]="name"
    />
  </div>
  <div>
    <input
      placeholder="Фамилия"
      [ngClass]="{ 'input-error': !surName }"
      [(ngModel)]="surName"
    />
  </div>
  <div>
    <input
      placeholder="Почта"
      [ngClass]="{ 'input-error': !email }"
      [(ngModel)]="email"
    />
  </div>
</div>
<div class="mt-3 d-flex justify-content-center">
  <button
    mat-flat-button
    (click)="onInitOrder()"
    [disabled]="!name || !surName || !email"
  >
    Оформить заказ
  </button>
</div>
